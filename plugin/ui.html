<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --bg: #ffffff;
        --fg: #1e1e1e;
        --muted: #6b6b6b;
        --border: #e5e5e5;
        --surface: #f5f5f5;
        --accent: #611f69;
        --connected-bg: #bdf0dc;
        --danger: #aa221c;
        --danger-border: #e90a00;
        --radius: 8px;
        --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        font-family: var(--font);
        font-size: 12px;
        color: var(--fg);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      section {
        margin: 0;
        padding: 0;
        border: none;
      }

      .section-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      button {
        height: 32px;
        padding: 0 12px;
        border: none;
        border-radius: var(--radius);
        font: inherit;
        font-weight: 500;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-primary:hover:not(:disabled) {
        background: #4a154b;
      }

      .btn-danger {
        background: #fff;
        color: var(--danger);
        border: 1px solid var(--danger-border);
      }

      .btn-danger:hover {
        background: #fff5f5;
      }

      .status-card {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
        padding: 10px 12px;
        border-radius: var(--radius);
        background: var(--surface);
        line-height: 1.4;
      }

      .status-card-connected {
        background: var(--connected-bg);
      }

      .status-card strong {
        display: block;
        font-weight: 600;
        line-height: normal;
      }

      .status-card p {
        margin: 0;
        line-height: 17px;
      }

      .segmented {
        display: flex;
        align-items: center;
        gap: 0;
        height: 32px;
        border: 1px solid var(--connected-bg);
        border-radius: var(--radius);
        overflow: hidden;
        background: #fff;
      }

      .segmented button {
        flex: 1;
        height: 30px;
        border-radius: 0;
        background: transparent;
        color: var(--fg);
        border: none;
        border-right: 1px solid var(--border);
        font-weight: 500;
      }

      .segmented button:last-child {
        border-right: none;
      }

      .segmented button[aria-pressed="true"] {
        background: var(--connected-bg);
        color: #000000;
        font-weight: 700;
        z-index: 1;
      }

      #message {
        min-height: 0;
        color: var(--muted);
        line-height: 1.4;
      }

      #message:empty {
        display: none;
      }

      #message.error {
        color: var(--danger);
      }

      #message.ok {
        color: #067647;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <section id="size-section">
      <span class="section-label">Import Size</span>
      <div class="segmented" role="group" aria-label="Import size">
        <button type="button" data-size="small" aria-pressed="false">S / 48px</button>
        <button type="button" data-size="medium" aria-pressed="true">M / 96px</button>
        <button type="button" data-size="large" aria-pressed="false">L / 128 px</button>
      </div>
    </section>

    <section id="auth-section">
      <div id="disconnected" class="status-card">
        <strong>Not Connected to Slack</strong>
        <p>Link a Slack workspace to import custom emoji.</p>
        <button id="connect-btn" class="btn-primary" type="button">
          Connect to Slack
        </button>
      </div>
      <div id="connected" class="status-card status-card-connected hidden">
        <strong id="team-name">Connected</strong>
        <p>Disconnect to import custom emoji from another workspace.</p>
        <button id="disconnect-btn" class="btn-danger" type="button">
          Disconnect
        </button>
      </div>
    </section>

    <div id="message" aria-live="polite"></div>
